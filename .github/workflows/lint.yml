name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: isort, black, and mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[viz,yaml,graph]" "black[jupyter]" "isort" "mypy"

      - name: Check import sorting with isort
        run: python -m isort --profile black --check-only src tests examples/*.py

      - name: Check formatting with black
        run: python -m black --check src tests examples/*.py

      - name: Type-check with mypy
        run: python -m mypy src
